[[reasons]]
title = "It's making your visitors choose your competitors"
text = "Vision is decision. If your site looks like a stale mess, then you are making it easy for your visitors to choose a competitor that looks more put together. Does your site convey your worth or does it convey your worthlessness? How could making an amazing website help you do better business?"
image = "/work/metriclab/crowd-2.jpg"
url = ""
anchortext = "See how I fixed this stale website"

[[reasons]]
title = "It's a nightmare to manage"
text = "Most have a one-size-fits-all DIY website that does everything but what you want it to do. So, you turn to plugins that add even more complexity. Unfortunately, those plugins eventually crash the site and create security holes that lead to being hacked. As a result, no one updates anything because they don't want to risk getting stuck with a crashed site. Is managing your site filled with anxiety? How could making an easy to manage website improve your business online?"
image = "/work/metriclab/crowd-2.jpg"
url = ""
anchortext = "See how I made this site easier to manage"

[[reasons]]
title = "It's killing your SEO"
text = "How is your website's loading speed? Is your website optimized for mobile viewers? Are your images too big? SEO is far more complex these days, and it will continue to grow in complexity. Unfortuantely, falling behind hurts your SEO. You might already be ranking lower in a Google search. How could ranking better in a Google search help your visibility online?"
image = "/work/metriclab/crowd-2.jpg"
url = ""
anchortext = "And worst of all—you've grown complacent"


