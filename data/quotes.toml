[[quote]]
text = "Leadership and learning are indispensable to each other."
name = "John F. Kennedy"

[[quote]]
text = "The pessimist complains about the wind. The optimist expects it to change. The leader adjusts the sails."
name = "John Maxwell"

[[quote]]
text = "Leaders establish trust with candor, transparency, and credit."
name = "Jack Welch, former CEO of General Electric"

[[quote]]
text = "People who are truly strong lift others up. People who are truly powerful bring others together."
name = "Michelle Obama, attorney and former First Lady of the United States"

[[quote]]
text = "Integrity without knowledge is weak and useless, and knowledge without integrity is dangerous and dreadful." 
name = "Samuel Johnson (1709 - 1784), English Author, Poet, and Literary Critic and Writer"

[[quote]]
text = "It is curious - curious that physical courage should be so common in the world, and moral courage so rare." 
name = "Mark Twain (1835 - 1910), American Novelist and Journalist"