{{ define "main" }}

  <div class="fullpageimage__layer" style="background-image: url('{{ .Params.feature_layer.image }}')">

    {{ range .Site.Data.links.links }}
      <ul class="linksBox">
      {{ range . }}
        <li>
          <a href="{{ .url }}">{{ .title | markdownify}}</a>
        </li>
      {{ end }}
      </ul>
    {{ end }}

  </div>

{{ end }}
