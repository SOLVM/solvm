<div class="video__layer">
  <div class="video__container">
    <h2 class="video__heading">{{ .video_layer.heading}}</h2>
    <div class="resize youtube">
      <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/{{ .video_layer.youtube_id }}"
        frameborder="0"
        allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</div>
